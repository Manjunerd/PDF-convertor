<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document to PDF Convertor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="card">
      <h1>Convert to PDF</h1>
      <p class="subtitle">Upload a PPT, PPTX, DOC, or DOCX file and download it as PDF.</p>

      <form id="convertForm">
        <label for="document" class="file-label">Choose Document</label>
        <input id="document" name="document" type="file" accept=".ppt,.pptx,.doc,.docx" required />

        <button type="submit" id="submitBtn">Convert File</button>
      </form>

      <p id="status" class="status"></p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
